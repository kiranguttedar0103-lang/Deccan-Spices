<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Mask for the circles: cuts a perfect, uniform offset gap around the leaves -->
    <!-- Shifted slightly upwards to translate(67, 38) to move the leaves higher on the circle -->
    <mask id="circle-mask">
      <rect x="0" y="0" width="120" height="120" fill="white" />
      <g transform="translate(67, 38)">
        <g fill="black" stroke="black" stroke-width="10" stroke-linejoin="round" stroke-linecap="round">
          <!-- Left Leaf solid outline in mask -->
          <path d="M 0,0 C -5,-5 -6,-16 0,-22 C 5,-16 4,-5 0,0 Z" transform="translate(-2, 0) rotate(-45)" />
          <!-- Center Leaf solid outline in mask -->
          <path d="M 0,0 C -5.8,-6 -6.8,-18 0,-25 C 5.8,-18 5,-6 0,0 Z" transform="translate(0, -4) rotate(12)" />
          <!-- Right Leaf solid outline in mask -->
          <path d="M 0,0 C -5,-5 -6,-16 0,-22 C 5,-16 4,-5 0,0 Z" transform="translate(2, 0) rotate(65)" />
          <!-- Stem base in mask -->
          <path d="M -0.5,0 C -1,3 -2.2,6 -3.5,8 C -2.5,6 -1.5,4 -0.2,0 Z" />
        </g>
      </g>
    </mask>
  </defs>

  <!-- Double Golden Circle Outline (Masked to leave a beautiful offset gap) -->
  <g mask="url(#circle-mask)">
    <circle cx="60" cy="65" r="43" fill="none" stroke="#d97706" stroke-width="2.5" />
    <circle cx="60" cy="65" r="39" fill="none" stroke="#d97706" stroke-width="1.2" />
  </g>

  <!-- Center Serif Letter 'D' in gold -->
  <text x="60" y="82" font-family="'Playfair Display', Georgia, serif" font-size="44" font-weight="800" fill="#d97706" text-anchor="middle">D</text>

  <!-- Golden Leaves on Top (Translated 67, 38 to sit slightly higher up) -->
  <g transform="translate(67, 38)">
    <!-- Left Leaf (Rotated -45 deg) -->
    <g transform="translate(-2, 0) rotate(-45)">
      <path d="M 0,0 C -4.2,-5 -4.8,-16 -0.6,-22 C -0.5,-14 -0.5,-6 0,0 Z" fill="#d97706" />
      <path d="M 0,0 C 4.2,-5 4.8,-16 0.6,-22 C 0.5,-14 0.5,-6 0,0 Z" fill="#d97706" />
    </g>

    <!-- Center Leaf (Rotated 12 deg) -->
    <g transform="translate(0, -4) rotate(12)">
      <path d="M 0,0 C -4.8,-6 -5.6,-18 -0.7,-25 C -0.6,-16 -0.6,-7 0,0 Z" fill="#d97706" />
      <path d="M 0,0 C 4.8,-6 5.6,-18 0.7,-25 C 0.6,-16 0.6,-7 0,0 Z" fill="#d97706" />
    </g>

    <!-- Right Leaf (Rotated 65 deg) -->
    <g transform="translate(2, 0) rotate(65)">
      <path d="M 0,0 C -4.2,-5 -4.8,-16 -0.6,-22 C -0.5,-14 -0.5,-6 0,0 Z" fill="#d97706" />
      <path d="M 0,0 C 4.2,-5 4.8,-16 0.6,-22 C 0.5,-14 0.5,-6 0,0 Z" fill="#d97706" />
    </g>

    <!-- Tiny joint stem pointing down-left -->
    <path d="M -0.5,0 C -1,3 -2.2,6 -3.5,8 C -2.5,6 -1.5,4 -0.2,0 Z" fill="#d97706" />
  </g>
</svg>