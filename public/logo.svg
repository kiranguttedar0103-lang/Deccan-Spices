<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <!-- Double Golden Circle Outline with gap at the top for leaves -->
  <!-- Outer Gold Circle Arc -->
  <path d="M 90.4 34.6 A 43 43 0 1 1 29.6 34.6" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" />
  <!-- Inner Gold Circle Arc -->
  <path d="M 87.6 37.4 A 39 39 0 1 1 32.4 37.4" fill="none" stroke="#d97706" stroke-width="1.2" stroke-linecap="round" />

  <!-- Center Serif Letter 'D' in golden color -->
  <text x="60" y="82" font-family="'Playfair Display', Georgia, serif" font-size="44" font-weight="800" fill="#d97706" text-anchor="middle">D</text>

  <!-- Golden Leaves on Top (Ditto shape matching branding crop) -->
  <g transform="translate(60, 40)">
    <!-- Left Leaf (Rotated -45 deg) -->
    <g transform="translate(-1, -1) rotate(-45)">
      <path d="M 0,0 C -5,-6 -7,-18 -1,-22 C -0.8,-15 -0.8,-6 0,0 Z" fill="#d97706" />
      <path d="M 0,0 C 5,-6 7,-18 1,-22 C 0.8,-15 0.8,-6 0,0 Z" fill="#d97706" />
    </g>

    <!-- Center Leaf (Rotated 15 deg) -->
    <g transform="translate(0, -3) rotate(15)">
      <path d="M 0,0 C -6,-7 -8,-21 -1.2,-26 C -1,-18 -1,-7 0,0 Z" fill="#d97706" />
      <path d="M 0,0 C 6,-7 8,-21 1.2,-26 C 1,-18 1,-7 0,0 Z" fill="#d97706" />
    </g>

    <!-- Right Leaf (Rotated 68 deg) -->
    <g transform="translate(1, 0) rotate(68)">
      <path d="M 0,0 C -5,-7 -7,-20 -1,-24 C -0.8,-16 -0.8,-6 0,0 Z" fill="#d97706" />
      <path d="M 0,0 C 5,-7 7,-20 1,-24 C 0.8,-16 0.8,-6 0,0 Z" fill="#d97706" />
    </g>

    <!-- Stem base pointing down-left, crossing the circle boundary smoothly -->
    <path d="M -0.8,0 C -1.5,4 -4,8 -6,11.5 C -4,11.5 -2,7 -0.2,0 Z" fill="#d97706" />
  </g>
</svg>
